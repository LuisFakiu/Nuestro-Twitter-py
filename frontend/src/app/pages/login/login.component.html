<div class="login-wrap">
  <div class="login-card">
    <div class="tabs">
      <button
        type="button"
        class="tab"
        [class.active]="mode() === 'login'"
        (click)="setMode('login')"
      >
        Ingresar
      </button>
      <button
        type="button"
        class="tab"
        [class.active]="mode() === 'register'"
        (click)="setMode('register')"
      >
        Registrarse
      </button>
    </div>

    @if (mode() === 'login') {
      <form [formGroup]="loginForm" (ngSubmit)="submit()">
        <h1>&gt; login</h1>

        <label>
          <span>Usuario</span>
          <input type="text" formControlName="username" autocomplete="username" />
        </label>

        <label>
          <span>Contraseña</span>
          <input type="password" formControlName="password" autocomplete="current-password" />
        </label>

        @if (error()) {
          <p class="error">{{ error() }}</p>
        }

        <button type="submit" [disabled]="loginForm.invalid || loading()">
          {{ loading() ? 'Ingresando…' : 'Entrar' }}
        </button>
      </form>
    } @else {
      <form [formGroup]="registerForm" (ngSubmit)="submit()">
        <h1>&gt; register</h1>

        <label>
          <span>Usuario</span>
          <input type="text" formControlName="username" autocomplete="username" />
          @if (registerForm.controls.username.touched && registerForm.controls.username.errors?.['minlength']) {
            <small class="hint">mín 3 caracteres</small>
          }
        </label>

        <label>
          <span>Email <em>(opcional)</em></span>
          <input type="email" formControlName="email" autocomplete="email" />
          @if (registerForm.controls.email.touched && registerForm.controls.email.errors?.['email']) {
            <small class="hint">email inválido</small>
          }
        </label>

        <label>
          <span>Contraseña</span>
          <input type="password" formControlName="password" autocomplete="new-password" />
          @if (registerForm.controls.password.touched && registerForm.controls.password.errors?.['minlength']) {
            <small class="hint">mín 8 caracteres</small>
          }
        </label>

        @if (error()) {
          <p class="error">{{ error() }}</p>
        }

        <button type="submit" [disabled]="registerForm.invalid || loading()">
          {{ loading() ? 'Creando…' : 'Crear cuenta' }}
        </button>
      </form>
    }

    <div class="divider"><span>o</span></div>
    <div id="googleBtn" class="google-btn"></div>
  </div>
</div>
